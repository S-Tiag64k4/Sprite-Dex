<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sprite Dex</title>

<meta name="mobile-web-app-capable" content="yes">

<!-- Polices : Space Grotesk (titres/UI), Inter (texte courant), JetBrains Mono (données/taux) -->
<!-- Chargées en amélioration progressive : si hors-ligne, repli automatique sur les polices système ci-dessous -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   0. TOKENS — palette, typographie, rayons, ombres, durées
   ============================================================ */
:root{
  color-scheme: dark;
  /* Fond */
  --bg-0:#0B0D14; --bg-1:#12151F; --bg-2:#171B29; --bg-glass: rgba(255,255,255,0.045);
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14);
  /* Texte */
  --text-0:#EDEFF4; --text-1:#AEB4C4; --text-2:#767E92;
  /* Accents (liés aux variantes du jeu — signature de l'app) */
  --c-purple:#7C6AE8; --c-pink:#E85D9C; --c-gold:#E8B84B; --c-green:#8FE0A0;
  --grad-aura: linear-gradient(135deg,var(--c-purple),var(--c-pink) 55%,var(--c-gold));
  /* Raretés */
  --r-rare:#5DA9E8; --r-epic:#B36AE8; --r-legend:#E8A23A; --r-mythic:#E85D5D;
  /* Rayons / ombres / durées */
  --rad-s:10px; --rad-m:16px; --rad-l:22px; --rad-xl:28px;
  --sh-1: 0 1px 2px rgba(0,0,0,.4);
  --sh-2: 0 8px 24px -8px rgba(0,0,0,.55);
  --sh-glow-purple: 0 0 0 1px rgba(124,106,232,.25), 0 8px 28px -6px rgba(124,106,232,.35);
  --ease: cubic-bezier(.22,1,.36,1);
  --dur-s:.16s; --dur-m:.32s; --dur-l:.5s;
  /* Typo */
  --f-display:'Space Grotesk', ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
  --f-body:'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --f-mono:'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
  /* Taille de texte utilisateur (ajustée en JS : 15 / 16.5 / 18.5) */
  --fs-root: 16px;
}
html[data-theme="light"]{
  color-scheme: light;
  --bg-0:#F3F1FA; --bg-1:#FFFFFF; --bg-2:#FBFAFF; --bg-glass: rgba(20,16,50,0.035);
  --border: rgba(20,16,60,0.09); --border-strong: rgba(20,16,60,0.16);
  --text-0:#181A2A; --text-1:#4E5266; --text-2:#8286A0;
  --sh-1: 0 1px 2px rgba(30,20,80,.06);
  --sh-2: 0 10px 26px -10px rgba(30,20,80,.18);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html{ font-size: var(--fs-root); }
body{
  margin:0; min-height:100vh; color:var(--text-0); font-family: var(--f-body);
  background:
    radial-gradient(ellipse 900px 600px at 20% -10%, rgba(124,106,232,.16), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(232,93,156,.10), transparent 55%),
    var(--bg-0);
  transition: background-color var(--dur-m) var(--ease), color var(--dur-m) var(--ease);
  overscroll-behavior-y: none;
}
h1,h2,h3,.disp{ font-family: var(--f-display); letter-spacing:-0.01em; }
.mono{ font-family: var(--f-mono); font-feature-settings:"tnum" 1; }
button, input{ font-family: inherit; color: inherit; }
button{ -webkit-appearance:none; appearance:none; background:none; border:none; cursor:pointer; transition: transform var(--dur-s) var(--ease); }
button:active{ transform: scale(.94); }
::selection{ background: rgba(124,106,232,.35); }
:focus-visible{ outline: 2px solid var(--c-purple); outline-offset: 2px; border-radius: 6px; }
a{ color: var(--c-purple); }
::-webkit-scrollbar{ width:0; height:0; }

/* Respect du mode "réduire les animations" */
@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
}
/* Même effet, mais activable manuellement depuis les Paramètres de l'app,
   indépendamment du réglage global du système. */
html.force-reduced-motion *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }

/* Mode compact : listes plus denses, notes de Sprite masquées */
html.compact .sc-note{ display:none; }
html.compact .sprite-card{ padding:9px 12px; }
html.compact .emoji-box{ width:38px; height:38px; font-size:1.1rem; }

/* ============================================================
   1. SHELL — conteneur, en-tête, navigation basse
   ============================================================ */
.app{ max-width: 720px; margin:0 auto; min-height:100vh; position:relative; padding-bottom: calc(78px + env(safe-area-inset-bottom)); }

.topbar{
  position:sticky; top:0; z-index:20; padding: calc(14px + env(safe-area-inset-top)) 18px 12px;
}
.topbar::before{
  content:"";
  position:absolute; inset:0; z-index:-1;
  background: linear-gradient(var(--bg-0) 55%, transparent);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  /* Le fond (couleur) et le flou d'arri\u00e8re-plan s'appliquaient auparavant sur toute la hauteur
     de l'en-t\u00eate de la m\u00eame fa\u00e7on : la couleur s'estompait en d\u00e9grad\u00e9, mais le flou, lui,
     s'arr\u00eatait net \u00e0 la limite du bloc, ce qui cr\u00e9ait une ligne visible entre "flou" et "net"
     quand le contenu d\u00e9filait dessous. Le masque applique le m\u00eame d\u00e9grad\u00e9 au flou lui-m\u00eame,
     pour que les deux s'estompent ensemble. Ce fond est isol\u00e9 dans un calque \u00e0 part (::before)
     plut\u00f4t que directement sur .topbar, pour que le masque ne touche jamais le texte du titre. */
  mask-image: linear-gradient(black 55%, transparent 100%);
  -webkit-mask-image: linear-gradient(black 55%, transparent 100%);
}
.topbar .eyebrow{ display:flex; align-items:center; gap:8px; font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:var(--c-purple); font-weight:600; }
.topbar h1{ font-size:1.7rem; font-weight:700; margin:2px 0 0; display:flex; align-items:center; gap:10px; }
.topbar .back-btn{ width:36px; height:36px; border-radius:50%; background:var(--bg-glass); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }

.page{ padding: 4px 18px 8px; overflow-x: hidden; }
.page-fade{ animation: pageIn var(--dur-m) var(--ease); }
@keyframes pageIn{ from{ opacity:0; transform: translateY(8px); } to{ opacity:1; transform:none; } }
.page-slide-right{ animation: slideInRight .45s cubic-bezier(.16,1,.3,1); }
.page-slide-left{ animation: slideInLeft .45s cubic-bezier(.16,1,.3,1); }
@keyframes slideInRight{ from{ opacity:0; transform: translateX(70px); } to{ opacity:1; transform:none; } }
@keyframes slideInLeft{ from{ opacity:0; transform: translateX(-70px); } to{ opacity:1; transform:none; } }

.navbar{
  position:fixed; left:0; right:0; bottom:0; z-index:30; max-width:720px; margin:0 auto;
  display:flex; justify-content:space-around; align-items:center;
  padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
  background: rgba(18,21,31,.72); backdrop-filter: blur(18px) saturate(160%);
  border-top:1px solid var(--border);
}
html[data-theme="light"] .navbar{ background: rgba(255,255,255,.78); }
.nav-btn{ display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 10px; border-radius: var(--rad-m); color:var(--text-2); flex:1; transition: color var(--dur-s), background var(--dur-s); position:relative; }
.nav-btn svg{ width:22px; height:22px; transition: transform var(--dur-s) var(--ease); }
.nav-btn span{ font-size:.62rem; font-weight:600; font-family:var(--f-display); letter-spacing:.02em; }
.nav-btn.active{ color: var(--c-purple); }
.nav-btn.active svg{ transform: translateY(-2px) scale(1.05); }
.nav-btn:active svg{ transform: scale(.88); }
.nav-dot{ position:absolute; top:2px; width:5px; height:5px; border-radius:50%; background:var(--c-pink); box-shadow:0 0 6px var(--c-pink); }

/* ============================================================
   2. PRIMITIVES — cartes, puces, switches, boutons
   ============================================================ */
.glass{
  background: linear-gradient(180deg, var(--bg-glass), transparent), var(--bg-1);
  border:1px solid var(--border); border-radius: var(--rad-l); box-shadow: var(--sh-1);
}
.section-card{ padding:18px 18px 20px; margin:14px 0; }
.section-title{ font-size:.92rem; font-weight:700; margin:0 0 12px; display:flex; align-items:center; gap:8px; }
.section-title .ico{ width:18px; height:18px; color:var(--c-purple); }

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:11px 18px; border-radius:999px; font-weight:600; font-size:.85rem;
  transition: transform var(--dur-s) var(--ease), box-shadow var(--dur-s), background var(--dur-s), opacity var(--dur-s);
}
.btn:active{ transform: scale(.96); }
.btn-primary{ background: var(--grad-aura); color:#fff; box-shadow: var(--sh-glow-purple); }
.btn-ghost{ background: var(--bg-glass); border:1px solid var(--border); color:var(--text-0); }
.btn-block{ width:100%; }

.chip{
  border:1px solid var(--border); color:var(--text-1); border-radius:999px; padding:7px 14px;
  font-size:.78rem; font-weight:600; white-space:nowrap; transition: all var(--dur-s) var(--ease);
}
.chip.active{ color:#fff; border-color:transparent; }
.chip-row{ display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; margin-bottom:14px; scrollbar-width:none; }

.switch{ width:44px; height:26px; border-radius:999px; background:var(--bg-glass); border:1px solid var(--border); position:relative; transition: background var(--dur-s); flex-shrink:0; }
.switch.on{ background: var(--grad-aura); border-color:transparent; }
.switch .knob{ position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; box-shadow:var(--sh-1); transition: transform var(--dur-m) var(--ease); }
.switch.on .knob{ transform: translateX(18px); }

.segmented{ display:flex; background:var(--bg-glass); border:1px solid var(--border); border-radius:999px; padding:3px; }
.segmented button{ flex:1; padding:8px 6px; border-radius:999px; font-size:.76rem; font-weight:600; color:var(--text-2); transition: all var(--dur-s) var(--ease); }
.segmented button.active{ background:var(--bg-1); color:var(--text-0); box-shadow:var(--sh-1); }

.search-bar{ display:flex; align-items:center; gap:10px; background:var(--bg-glass); border:1px solid var(--border); border-radius:999px; padding:11px 16px; margin-bottom:14px; }
.search-bar svg{ width:17px; height:17px; color:var(--text-2); flex-shrink:0; }
.search-bar input{ flex:1; background:none; border:none; outline:none; font-size:.9rem; color:var(--text-0); min-width:0; }
.search-bar input::placeholder{ color:var(--text-2); }
.search-bar .clear-x{ color:var(--text-2); font-size:1rem; padding:2px; transition: opacity var(--dur-s) var(--ease), transform var(--dur-s) var(--ease); }

/* Utilitaire générique : fait entrer un élément en fondu + léger décalage vers le haut.
   Utilisé sur les listes (Sprites, succès, stats...) avec un animation-delay croissant
   par élément, pour un effet "cascade" à l'apparition plutôt qu'un bloc figé. */
.stagger-in{ animation: fadeUp var(--dur-m) var(--ease) both; }

/* ============================================================
   3. HOME
   ============================================================ */
.ring-wrap{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:8px 0 4px; }
.ring-num{ font-family:var(--f-display); font-weight:700; font-size:2.5rem; letter-spacing:-0.03em; }
.ring-num .of{ font-size:1.1rem; color:var(--text-2); font-weight:600; }
.ring-cap{ font-size:.78rem; color:var(--text-1); }

.stat-grid{ display:grid; grid-template-columns: repeat(2,1fr); gap:10px; margin-top:14px; }
.stat-mini{ padding:12px 14px; border-radius: var(--rad-m); background:var(--bg-glass); border:1px solid var(--border); }
.stat-mini .v{ font-family:var(--f-display); font-size:1.35rem; font-weight:700; }
.stat-mini .l{ font-size:.68rem; color:var(--text-2); text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }

.hscroll{ display:flex; gap:10px; overflow-x:auto; padding:2px 2px 8px; scrollbar-width:none; }
.mini-sprite{ flex-shrink:0; width:78px; display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 8px; border-radius: var(--rad-m); background:var(--bg-glass); border:1px solid var(--border); }
.mini-sprite .emoji{ font-size:1.4rem; }
.mini-sprite .n{ font-size:.68rem; font-weight:700; text-align:center; line-height:1.2; }
.mini-sprite .variant-tag{ font-size:.58rem; font-weight:700; padding:1px 6px; border-radius:999px; }
.empty-hint{ font-size:.8rem; color:var(--text-2); padding:10px 2px; }

.achv-mini-row{ display:flex; align-items:center; gap:12px; padding:10px 2px; border-bottom:1px solid var(--border); }
.achv-mini-row:last-child{ border-bottom:none; }
.achv-mini-row .ic{ width:34px; height:34px; border-radius:10px; background:rgba(232,184,75,.14); border:1px solid rgba(232,184,75,.3); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
.achv-mini-row .n{ font-size:.82rem; font-weight:700; }
.achv-mini-row .d{ font-size:.7rem; color:var(--text-2); }

/* ============================================================
   4. COLLECTION + FICHE SPRITE
   ============================================================ */
.sprite-card{ display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius: var(--rad-m); background:var(--bg-glass); border:1px solid var(--border); margin-bottom:9px; transition: transform var(--dur-s) var(--ease), border-color var(--dur-s); }
.sprite-card:active{ transform: scale(.985); }
.emoji-box{ width:46px; height:46px; border-radius:13px; background:var(--bg-2); border:1px solid var(--border-strong); display:flex; align-items:center; justify-content:center; font-size:1.35rem; flex-shrink:0; position:relative; }
.fav-dot{ position:absolute; top:-4px; right:-4px; width:14px; height:14px; border-radius:50%; background:var(--c-pink); border:2px solid var(--bg-1); display:flex; align-items:center; justify-content:center; font-size:8px; animation: pop .3s var(--ease); }
.sc-body{ flex:1; min-width:0; }
.sc-top{ display:flex; align-items:center; gap:6px; }
.sc-name{ font-weight:700; font-size:.92rem; }
.rarity-pill{ font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em; border-radius:5px; padding:2px 6px; flex-shrink:0; }
.sc-note{ font-size:.72rem; color:var(--text-2); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sc-bar-bg{ height:5px; border-radius:99px; background:rgba(255,255,255,.06); margin-top:7px; overflow:hidden; }
.sc-bar-fill{ height:100%; border-radius:99px; transition: width var(--dur-m) var(--ease); }
.sc-count{ font-size:.7rem; color:var(--text-2); font-weight:700; flex-shrink:0; font-family:var(--f-mono); }
.sc-count.full{ color: var(--c-green); }
.sc-chevron{ color:var(--text-2); flex-shrink:0; width:16px; height:16px; }

.no-results{ text-align:center; color:var(--text-2); font-size:.85rem; padding:40px 10px; }

/* Fiche détaillée (bottom sheet) */
.sheet-backdrop{ position:fixed; inset:0; background:rgba(4,5,10,.6); backdrop-filter: blur(3px); z-index:50; opacity:0; pointer-events:none; transition: opacity var(--dur-m) var(--ease); }
.sheet-backdrop.show{ opacity:1; pointer-events:auto; }
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:51; max-width:720px; margin:0 auto;
  background: var(--bg-1); border-radius: 26px 26px 0 0; border:1px solid var(--border); border-bottom:none;
  max-height:88vh; overflow-y:auto; transform: translateY(100%); transition: transform var(--dur-l) var(--ease);
  padding: 10px 20px calc(28px + env(safe-area-inset-bottom));
  box-shadow: 0 -20px 50px rgba(0,0,0,.5);
}
.sheet.show{ transform: translateY(0); }
.sheet-handle{ width:38px; height:4px; border-radius:99px; background:var(--border-strong); margin:6px auto 14px; }
.sheet-head{ display:flex; align-items:flex-start; gap:14px; }
.sheet-emoji{ width:64px; height:64px; border-radius:18px; background:var(--bg-2); border:1px solid var(--border-strong); display:flex; align-items:center; justify-content:center; font-size:2rem; flex-shrink:0; }
.sheet-title{ font-size:1.25rem; font-weight:700; }
.sheet-close{ margin-left:auto; width:32px; height:32px; border-radius:50%; background:var(--bg-glass); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sheet-fav{ width:32px; height:32px; border-radius:50%; background:var(--bg-glass); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:1rem; }
.sheet-fav.on{ background:rgba(232,93,156,.18); border-color:var(--c-pink); }
.sheet-note{ font-size:.85rem; color:var(--text-1); margin-top:10px; line-height:1.5; }
.sheet-meta-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.meta-tag{ font-size:.68rem; color:var(--text-2); background:var(--bg-glass); border:1px solid var(--border); padding:4px 9px; border-radius:999px; }
.rate-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:8px; margin-top:6px; }
.rate-card{ padding:10px 6px; border-radius:12px; text-align:center; border:1px solid var(--border); background:var(--bg-glass); }
.rate-card .rl{ font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em; }
.rate-card .rv{ font-size:.75rem; font-weight:700; margin-top:3px; }
.sheet-tip{ margin-top:14px; padding:12px 14px; border-radius:14px; background:rgba(124,106,232,.08); border:1px solid rgba(124,106,232,.22); font-size:.8rem; line-height:1.5; }
.sheet-maplink{ margin-top:10px; display:inline-flex; align-items:center; gap:6px; font-size:.78rem; font-weight:700; color:var(--c-purple); }

.variant-row{ display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:14px; border:1px solid var(--border); margin-bottom:8px; background:var(--bg-glass); transition: all var(--dur-s) var(--ease); }
.variant-toggle{ display:flex; flex-direction:column; align-items:flex-start; gap:2px; flex:1; }
.variant-toggle .vt-top{ display:flex; align-items:center; gap:8px; font-size:.82rem; font-weight:700; }
.vbox{ width:19px; height:19px; border-radius:6px; border:2px solid var(--border-strong); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:.7rem; transition: all var(--dur-s) var(--ease); }
.vbox.checked{ animation: pop var(--dur-m) var(--ease); }
@keyframes pop{ 0%{ transform:scale(.7);} 60%{ transform:scale(1.15);} 100%{ transform:scale(1);} }
.vt-rate{ font-size:.66rem; color:var(--text-2); margin-left:27px; }
.mastery-toggle{ display:flex; align-items:center; gap:5px; padding:6px 10px; border-radius:8px; border:1px solid var(--border); color:var(--text-2); font-size:.64rem; font-weight:700; white-space:nowrap; }
.mastery-toggle.on{ border-color: var(--c-green); background:rgba(143,224,160,.14); color:var(--c-green); }
.mbox{ width:13px; height:13px; border-radius:4px; border:1.5px solid var(--border-strong); display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* ============================================================
   5. CARTE
   ============================================================ */
.map-disclaimer{ font-size:.7rem; color:var(--text-2); font-style:italic; margin-bottom:12px; line-height:1.4; }
.map-legend{ display:flex; gap:14px; margin-bottom:12px; flex-wrap:wrap; }
.map-legend .li{ display:flex; align-items:center; gap:6px; font-size:.68rem; color:var(--text-2); }
.map-legend .sw{ width:9px; height:9px; border-radius:50%; }
.map-viewport{ position:relative; width:100%; aspect-ratio:1/1; border-radius: var(--rad-l); overflow:hidden; border:1px solid var(--border); touch-action:none;
  background: radial-gradient(ellipse at 50% 45%, var(--bg-2) 0%, var(--bg-1) 70%, var(--bg-0) 100%); }
.map-inner{ position:absolute; inset:0; transform-origin: 0 0; }

// ----- Syst\u00e8me de niveau / XP -----
// XP accord\u00e9 par capture, selon la raret\u00e9 du Sprite et la variante obtenue.
const RARITY_XP = { Rare: 10, Epic: 20, Legendary: 40, Mythic: 80 };
const VARIANT_XP_MULT = { base: 1, gold: 1.5, gummy: 2, galaxy: 3 };
const LEVEL_STEP = 60; // XP n\u00e9cessaire par niveau (palier fixe, simple et pr\u00e9visible)
const LEVEL_TITLES = [
  { max: 3, title: "D\u00e9butant" },
  { max: 7, title: "Chasseur" },
  { max: 12, title: "Expert" },
  { max: 17, title: "Ma\u00eetre" },
  { max: Infinity, title: "L\u00e9gende" },
];
function xpForCapture(sprite, variantKey){
  return (RARITY_XP[sprite.rarity] || 0) * (VARIANT_XP_MULT[variantKey] || 1);
}
function computeTotalXP(){
  let xp = 0;
  Object.entries(state.progress).forEach(([k, v]) => {
    if (!v || k.startsWith("mastery:")) return;
    const [spriteId, variantKey] = k.split(":");
    const sprite = SPRITES.find(s => s.id === spriteId);
    if (sprite) xp += xpForCapture(sprite, variantKey);
  });
  return xp;
}
function titleForLevel(level){
  return (LEVEL_TITLES.find(t => level <= t.max) || LEVEL_TITLES[LEVEL_TITLES.length-1]).title;
}
function levelInfo(xp){
  const level = Math.floor(xp / LEVEL_STEP) + 1;
  const into = xp % LEVEL_STEP;
  const pct = Math.round((into / LEVEL_STEP) * 100);
  return { level, into, pct, next: LEVEL_STEP, title: titleForLevel(level), xp };
}

   ---------------------------------------------------------------- */
const VARIANT_MULT = { base: 1, gold: 0.0122, gummy: 0.00697, galaxy: 0.00348 };
function parseRange(str) {
  const m1 = str.match(/([\d.]+)-([\d.]+)%/);
  if (m1) return [parseFloat(m1[1]), parseFloat(m1[2])];
  const m2 = str.match(/([\d.]+)%/);
  if (m2) return [parseFloat(m2[1]), parseFloat(m2[1])];
  return null;
}
function variantRateLabel(sprite, variantKey) {
  if (variantKey === "base") return sprite.drop;
  const range = parseRange(sprite.drop);
  if (!range) return "Estimation indisponible";
  const mult = VARIANT_MULT[variantKey];
  const lo = range[0] * mult, hi = range[1] * mult;
  const fmt = (n) => { if (n >= 1) return n.toFixed(2); if (n >= 0.01) return n.toFixed(3); return n.toFixed(7).replace(/0+$/, "").replace(/\.$/, ""); };
  return lo === hi ? "~" + fmt(lo) + "%" : "~" + fmt(lo) + "-" + fmt(hi) + "%";
}

/* ----- Estimation du temps de capture ------------------------------------
   Hypoth\u00e8ses (affich\u00e9es \u00e0 l'utilisateur, \u00e0 ajuster mentalement selon son propre rythme) :
   - CHESTS_PER_MATCH : nombre de Coffres Sprite ouverts en moyenne par partie
     en farmant une zone dense comme Sinister Strip.
   - MATCH_MINUTES : dur\u00e9e moyenne d'une partie de farm (looter puis mourir/quitter).
   Calcul : esp\u00e9rance du nombre d'essais pour un premier succ\u00e8s = 1 / p (loi g\u00e9om\u00e9trique),
   converti en parties puis en dur\u00e9e. C'est une moyenne th\u00e9orique, pas une garantie :
   la vraie dur\u00e9e peut varier \u00e9norm\u00e9ment d'une tentative \u00e0 l'autre. */
const CHESTS_PER_MATCH = 3;
const MATCH_MINUTES = 12;

function fmtDuration(minutes){
  if (minutes < 1) return "< 1 min";
  if (minutes < 60) return Math.round(minutes) + " min";
  const hours = minutes / 60;
  if (hours < 24) return (hours < 10 ? hours.toFixed(1) : Math.round(hours)) + " h";
  const days = hours / 24;
  if (days < 30) return Math.round(days) + " j";
  const months = days / 30;
  if (months < 12) return Math.round(months) + " mois";
  const years = days / 365;
  if (years < 1000) return Math.round(years) + " an" + (years >= 2 ? "s" : "");
  return "des mill\u00e9naires (valeur th\u00e9orique)";
}

function getRateNumeric(sprite, variantKey){
  const range = parseRange(sprite.drop);
  if (!range) return null;
  const midBase = (range[0] + range[1]) / 2;
  if (variantKey === "base") return midBase;
  const mult = VARIANT_MULT[variantKey];
  if (mult === undefined) return null;
  return midBase * mult;
}

function estimateCaptureTime(sprite, variantKey){
  const pct = getRateNumeric(sprite, variantKey);
  if (pct === null || pct <= 0) return null;
  const p = pct / 100;
  const expectedChests = 1 / p;
  const expectedMatches = expectedChests / CHESTS_PER_MATCH;
  const expectedMinutes = expectedMatches * MATCH_MINUTES;
  return fmtDuration(expectedMinutes);
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ----- Checklist : utilitaires de date + reset automatique ----- */
function pad2(n){ return n < 10 ? "0"+n : ""+n; }
function todayStr(){ const d = new Date(); return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function mondayOfWeekStr(){
  const d = new Date();
  const day = d.getDay(); // 0=dimanche
  const diff = (day === 0 ? -6 : 1) - day; // recule jusqu'au lundi de la semaine en cours
  const monday = new Date(d);
  monday.setDate(d.getDate() + diff);
  return monday.getFullYear()+"-"+pad2(monday.getMonth()+1)+"-"+pad2(monday.getDate());
}
function ensureChecklistFresh(){
  const c = state.checklist;
  const t = todayStr(), w = mondayOfWeekStr();
  let changed = false;
  if (c.dailyDate !== t){ c.dailyDate = t; c.dailyDone = {}; changed = true; }
  if (c.weekStart !== w){ c.weekStart = w; c.weeklyDone = {}; changed = true; }
  if (changed) persistChecklist();
}
function toggleDailyTask(id){
  state.checklist.dailyDone[id] = !state.checklist.dailyDone[id];
  persistChecklist();
  renderPage();
}
function toggleWeeklyTask(id){
  state.checklist.weeklyDone[id] = !state.checklist.weeklyDone[id];
  persistChecklist();
  renderPage();
}

/* ----- Page Historique ----- */
function relTime(ts){
  const diffMs = Date.now() - ts;
  const min = Math.floor(diffMs / 60000);
  if (min < 1) return "\u00e0 l'instant";
  if (min < 60) return "il y a " + min + " min";
  const h = Math.floor(min / 60);
  if (h < 24) return "il y a " + h + " h";
  const d = Math.floor(h / 24);
  if (d < 7) return "il y a " + d + " j";
  const dt = new Date(ts);
  return pad2(dt.getDate()) + "/" + pad2(dt.getMonth()+1) + "/" + dt.getFullYear();
}
function renderHistoryPage(){
  if (!state.history.length){
    return '<div class="no-results">Aucune capture enregistr\u00e9e pour l\u2019instant.<br>Coche une variante dans la Collection pour commencer ton historique.</div>';
  }
  let html = '<div class="glass section-card">';
  html += '  <div class="setting-sub" style="margin-bottom:10px;">' + state.history.length + ' capture' + (state.history.length>1?'s':'') + ' enregistr\u00e9e' + (state.history.length>1?'s':'') + ' (50 derni\u00e8res conserv\u00e9es).</div>';
  html += state.history.map((h, i) => {
    const [spriteId, variantKey] = h.key.split(":");
    const sprite = SPRITES.find(s => s.id === spriteId);
    if (!sprite) return "";
    const v = VARIANTS.find(x => x.key === variantKey);
    const xp = xpForCapture(sprite, variantKey);
    return '<div class="achv-mini-row stagger-in" style="animation-delay:' + Math.min(i*0.02, 0.3) + 's">' +
      '<div class="ic" style="background:' + v.glow + ';border-color:' + v.color + '55;">' + sprite.emoji + '</div>' +
      '<div style="flex:1;"><div class="n">' + sprite.name + ' <span style="color:' + v.color + ';">' + v.label + '</span></div>' +
      '<div class="d">' + relTime(h.ts) + ' \u00b7 +' + xp + ' XP</div></div>' +
      '</div>';
  }).join("");
  html += '</div>';
  return html;
}

const PAGES = [
  { id:"home", label:"Accueil", title:"Sprite Dex", icon:"home", color:"#7C6AE8" },
  { id:"collection", label:"Collection", title:"Collection", icon:"collection", color:"#E85D9C" },
  { id:"map", label:"Carte", title:"Carte des zones", icon:"map", color:"#5DA9E8" },
  { id:"achievements", label:"Succ\u00e8s", title:"Succ\u00e8s", icon:"trophy", color:"#E8B84B" },

  { id:"settings", label:"Param\u00e8tres", title:"Param\u00e8tres", icon:"settings", color:"#AEB4C4" },
];

function goTo(pageId, opts){
  // Détermine le sens du glissement en comparant la position des onglets dans PAGES :
  // si on va vers un onglet plus à droite dans la barre de nav -> le contenu entre par la droite,
  // si on va vers un onglet plus à gauche -> il entre par la gauche.
  // "stats" n'est pas un onglet de la barre (page secondaire ouverte depuis Accueil) : pas de sens défini, on garde un simple fondu.
  const oldIdx = PAGES.findIndex(p => p.id === state.page);
  const newIdx = PAGES.findIndex(p => p.id === pageId);
  let direction = null;
  if (oldIdx !== -1 && newIdx !== -1 && oldIdx !== newIdx){
    direction = newIdx > oldIdx ? "forward" : "back";
  }
  state.page = pageId;
  if (opts && opts.zone) { state.activeZone = opts.zone; }
  renderShell();
  renderPage(direction);
  window.scrollTo(0, 0);
}

function renderShell(){
  // Barre de navigation
  const nav = document.getElementById("navbar");
  nav.innerHTML = PAGES.map(p => {
    const active = state.page === p.id || (p.id === "home" && state.page === "stats");
    return '<button class="nav-btn ' + (active ? "active" : "") + '" style="' + (active ? "color:" + p.color + ";" : "") + '" aria-label="' + p.label + '" aria-current="' + (active?"page":"false") + '" onclick="goTo(\'' + p.id + '\')">' +
      ICONS[p.icon] + '<span>' + p.label + '</span></button>';
  }).join("");

  // En-tête
  const top = document.getElementById("topbar");
  const isSub = state.page === "stats" || state.page === "history";
  if (isSub){
    const subTitle = state.page === "stats" ? "Statistiques" : "Historique";
    top.innerHTML = '<div style="display:flex;align-items:center;gap:10px;">' +
      '<button class="back-btn" aria-label="Retour" onclick="goTo(\'home\')">' + ICONS.back + '</button>' +
      '<h1 style="font-size:1.25rem;">' + subTitle + '</h1></div>';
  } else {
    const meta = PAGES.find(p => p.id === state.page);
    top.innerHTML = '<div class="eyebrow">' + ICONS.sparkle.replace('<svg ', '<svg style="width:12px;height:12px;" ') + ' Chapitre 7 \u00b7 Saison 3 \u00b7 Runners</div><h1>' + meta.title + '</h1>';
  }
}

function renderPage(navDirection){
  const c = document.getElementById("pageContainer");
  const renderers = { home: renderHome, collection: renderCollection, map: renderMapPage, achievements: renderAchievementsPage, news: renderNews, settings: renderSettings, stats: renderStats, history: renderHistoryPage };
  const html = (renderers[state.page] || renderHome)();
  // On enveloppe le contenu dans une div fraîchement créée à chaque appel.
  // Une animation CSS ne se rejoue jamais sur un élément déjà présent dans le DOM
  // (ici #pageContainer, qui ne change pas), même si on change son innerHTML.
  // En revanche, un nouvel élément inséré dans le DOM déclenche toujours ses
  // animations CSS dès son insertion : c'est ce qu'on exploite ici.
  // navDirection n'est fourni QUE par goTo() (vraie navigation d'onglet) :
  // les autres appels à renderPage() (cocher une case, changer un réglage, etc.)
  // n'en passent pas et gardent donc le simple fondu, pour ne pas faire glisser
  // toute la page à chaque interaction qui ne change pas d'onglet.
  const animClass = navDirection === "forward" ? "page-slide-right"
                   : navDirection === "back" ? "page-slide-left"
                   : "page-fade";
  c.innerHTML = '<div class="' + animClass + '">' + html + '</div>';
  // Actions post-rendu spécifiques à certaines pages
  if (state.page === "map") { attachMapGestures(); renderMapPins(); }
  checkAchievements();
}

function ringSVG(pct, size, strokeW){
  size = size || 168; strokeW = strokeW || 14;
  const r = (size - strokeW) / 2;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - pct/100);
  const id = "ringGrad";
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">' +
    '<defs><linearGradient id="'+id+'" x1="0%" y1="0%" x2="100%" y2="100%">' +
      '<stop offset="0%" stop-color="#7C6AE8"/><stop offset="55%" stop-color="#E85D9C"/><stop offset="100%" stop-color="#E8B84B"/>' +
    '</linearGradient></defs>' +
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="'+strokeW+'"/>' +
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="url(#'+id+')" stroke-width="'+strokeW+'" stroke-linecap="round" ' +
      'stroke-dasharray="'+c+'" stroke-dashoffset="'+offset+'" transform="rotate(-90 '+size/2+' '+size/2+')" style="transition: stroke-dashoffset .8s cubic-bezier(.22,1,.36,1);"/>' +
    '</svg>';
}

   ---------------------------------------------------------------- */
function sortSprites(list){
  const by = state.sortBy;
  const copy = list.slice();
  if (by === "name") copy.sort((a,b) => a.name.localeCompare(b.name));
  else if (by === "rarity") copy.sort((a,b) => RARITY_INDEX[b.rarity]-RARITY_INDEX[a.rarity]);
  else if (by === "date") copy.sort((a,b) => { const [da,ma,ya]=a.added.split("/"); const [db,mb,yb]=b.added.split("/"); return new Date(yb,mb-1,db) - new Date(ya,ma-1,da); });
  else if (by === "drop") copy.sort((a,b) => (parseRange(a.drop)?.[0]||0) - (parseRange(b.drop)?.[0]||0));
  else if (by === "progress") copy.sort((a,b) => (spriteDoneCount(b)/b.variants.length) - (spriteDoneCount(a)/a.variants.length));
  else if (by === "owned") copy.sort((a,b) => spriteDoneCount(b) - spriteDoneCount(a));
  else if (by === "missing") copy.sort((a,b) => (b.variants.length-spriteDoneCount(b)) - (a.variants.length-spriteDoneCount(a)));
  return copy;
}

const SORT_OPTIONS = [["name","Nom"],["rarity","Raret\u00e9"],["date","Date"],["drop","Taux"],["progress","Progr."],["owned","Poss."],["missing","Manquants"]];

function getFilteredSortedSprites(){
  let list = SPRITES.filter(s => {
    if (state.favOnly && !state.favorites[s.id]) return false;
    if (state.filterVariant !== "all" && !s.variants.includes(state.filterVariant)) return false;
    if (state.search && !s.name.toLowerCase().includes(state.search.toLowerCase())) return false;
    return true;
  });
  return sortSprites(list);
}

// Rend uniquement la liste (utilisé au premier affichage ET pour les mises à jour
// de recherche/tri/filtre, afin de ne jamais reconstruire la barre de recherche
// elle-même — ce qui casserait le focus et la position du curseur en cours de frappe).
function renderSpriteListHTML(){
  const list = getFilteredSortedSprites();
  if (!list.length) return '<div class="no-results">Aucun Sprite ne correspond \u00e0 ces filtres.</div>';
  return list.map((s, i) => {
    const spriteDone = spriteDoneCount(s), spriteTotal = s.variants.length;
    const pct = Math.round((spriteDone/spriteTotal)*100);
    const isFav = !!state.favorites[s.id];
    return '<button class="sprite-card stagger-in" style="width:100%;text-align:left;animation-delay:' + Math.min(i*0.035, 0.4) + 's" onclick="openSheet(\'' + s.id + '\')">' +
      '<div class="emoji-box">' + s.emoji + (isFav ? '<div class="fav-dot">\u2665</div>' : '') + '</div>' +
      '<div class="sc-body">' +
      '  <div class="sc-top"><span class="sc-name">' + s.name + '</span>' +
      '  <span class="rarity-pill" style="color:' + RARITY_COLORS[s.rarity] + ';border:1px solid ' + RARITY_COLORS[s.rarity] + '55;">' + s.rarity + '</span></div>' +
      '  <div class="sc-note">' + s.note + '</div>' +
      '  <div class="sc-bar-bg"><div class="sc-bar-fill" style="width:' + pct + '%;background:var(--grad-aura);"></div></div>' +
      '</div>' +
      '<div class="sc-count ' + (spriteDone===spriteTotal?"full":"") + '">' + spriteDone + '/' + spriteTotal + '</div>' +
      ICONS.chevron.replace('<svg ', '<svg class="sc-chevron" ') +
      '</button>';
  }).join("");
}

// Met à jour uniquement la liste (et les puces actives), sans toucher à la barre de
// recherche : préserve le focus, la position du curseur et le défilement en cours.
function updateCollectionView(){
  const listEl = document.getElementById("spriteListContainer");
  if (!listEl) { renderPage(); return; } // repli si on n'est plus sur la page Collection
  listEl.innerHTML = renderSpriteListHTML();
  const clearBtn = document.getElementById("searchClearBtn");
  if (clearBtn){
    if (state.search){ clearBtn.style.opacity = "1"; clearBtn.style.pointerEvents = "auto"; clearBtn.style.transform = "scale(1)"; }
    else { clearBtn.style.opacity = "0"; clearBtn.style.pointerEvents = "none"; clearBtn.style.transform = "scale(.7)"; }
  }
  refreshChipStates();
}
function refreshChipStates(){
  const variantChips = document.querySelectorAll('[data-variant-chip]');
  variantChips.forEach(btn => {
    const key = btn.getAttribute('data-variant-chip');
    const active = state.filterVariant === key;
    btn.classList.toggle('active', active);
    btn.style.background = active ? (key === 'all' ? 'var(--grad-aura)' : (VARIANTS.find(v=>v.key===key)||{}).color || '') : '';
  });
  const favChip = document.getElementById('favOnlyChip');
  if (favChip){ favChip.classList.toggle('active', state.favOnly); favChip.style.background = state.favOnly ? 'var(--c-pink)' : ''; }
  const sortChips = document.querySelectorAll('[data-sort-chip]');
  sortChips.forEach(btn => {
    const key = btn.getAttribute('data-sort-chip');
    const active = state.sortBy === key;
    btn.classList.toggle('active', active);

}

function setSortBy(v){ state.sortBy = v; updateCollectionView(); }
function toggleFavOnly(){ state.favOnly = !state.favOnly; updateCollectionView(); }

function toggleFavorite(spriteId){
  state.favorites[spriteId] = !state.favorites[spriteId];
  persistFavorites();
  showToast(state.favorites[spriteId] ? "Ajout\u00e9 aux favoris" : "Retir\u00e9 des favoris", "\u2665");
  renderPage();
  if (state.sheetSpriteId === spriteId) renderSheetContent(spriteId);
}

function hapticFeedback(pattern){
  if (!state.settings.vibrations) return;
  try { if (navigator.vibrate) navigator.vibrate(pattern || 12); } catch(e) { /* non supporté sur cet appareil, ignoré silencieusement */ }
}

function toggle(spriteId, variantKey){
  const k = spriteId + ":" + variantKey;
  const nowTrue = !state.progress[k];
  const levelBefore = levelInfo(computeTotalXP()).level;
  state.progress[k] = nowTrue;
  hapticFeedback(nowTrue ? [14] : 8);
  if (nowTrue){
    state.history.unshift({ key:k, ts: Date.now() });
    state.history = state.history.slice(0, 50);
    showToast("Sprite obtenu !", "\u2728");
  } else {
    state.history = state.history.filter(h => h.key !== k);
  }
  persistProgress(); persistHistory();
  const levelAfter = levelInfo(computeTotalXP()).level;
  if (levelAfter > levelBefore && levelAfter > state.levelSeen){
    state.levelSeen = levelAfter;
    persistLevelSeen();
    hapticFeedback([10,40,10]);
    setTimeout(() => showToast("Niveau " + levelAfter + " atteint \u2014 " + titleForLevel(levelAfter) + " !", "\u{1f31f}"), 350);
  }
  renderPage();
  if (state.sheetSpriteId === spriteId) renderSheetContent(spriteId);
}
function toggleMastery(spriteId, variantKey){
  if (!state.progress[spriteId + ":" + variantKey]){
    showToast("Obtiens d'abord cette variante", "\u26a0\ufe0f");
    return;
  }
  const k = "mastery:" + spriteId + ":" + variantKey;
  state.progress[k] = !state.progress[k];
  hapticFeedback(10);
  persistProgress();
  renderPage();
  if (state.sheetSpriteId === spriteId) renderSheetContent(spriteId);
}
function resetAll(){
  if (confirm("R\u00e9initialiser toute la progression ? Cette action est irr\u00e9versible.")){
    state.progress = {}; state.history = [];
    persistProgress(); persistHistory();
    renderPage();
    showToast("Progression r\u00e9initialis\u00e9e", "\u21ba");
  }
}

  const inner = document.getElementById("mapInner");

  inner.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
}
function mapZoomBy(factor){
  const z = state.mapZoom;
  z.scale = Math.min(3, Math.max(1, z.scale * factor));
  updateMapTransform();
}
function mapResetView(){ state.mapZoom = { scale:1, tx:0, ty:0 }; updateMapTransform(); }

function attachMapGestures(){
  const vp = document.getElementById("mapViewport");
  if (!vp) return;
  let dragging = false, lastX=0, lastY=0, pinchStartDist=0, pinchStartScale=1;
  const pts = new Map();

  vp.addEventListener("pointerdown", (e) => {
    vp.setPointerCapture(e.pointerId);
    pts.set(e.pointerId, {x:e.clientX,y:e.clientY});
    if (pts.size === 1){ dragging = true; lastX = e.clientX; lastY = e.clientY; }
    if (pts.size === 2){
      dragging = false;
      const [a,b] = [...pts.values()];
      pinchStartDist = Math.hypot(a.x-b.x, a.y-b.y);
      pinchStartScale = state.mapZoom.scale;
    }
  });
  vp.addEventListener("pointermove", (e) => {
    if (!pts.has(e.pointerId)) return;
    pts.set(e.pointerId, {x:e.clientX,y:e.clientY});
    if (pts.size === 2){
      const [a,b] = [...pts.values()];
      const dist = Math.hypot(a.x-b.x, a.y-b.y);
      state.mapZoom.scale = Math.min(3, Math.max(1, pinchStartScale * (dist/pinchStartDist)));
      updateMapTransform();
    } else if (dragging){
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      const z = state.mapZoom;
      z.tx += dx; z.ty += dy;
      updateMapTransform();
    }
  });
  const end = (e) => { pts.delete(e.pointerId); if (pts.size < 2) dragging = pts.size === 1; if (pts.size===0) dragging=false; };
  vp.addEventListener("pointerup", end);
  vp.addEventListener("pointercancel", end);
  vp.addEventListener("wheel", (e) => { e.preventDefault(); mapZoomBy(e.deltaY < 0 ? 1.1 : 0.9); }, { passive:false });
}

/* ----- Statut des News calcul\u00e9 depuis l'horloge de l'appareil -----
   Contrairement au contenu (titres/dates des events, qui doivent \u00eatre ajout\u00e9s
   \u00e0 la main d\u00e8s qu'Epic annonce du nouveau), l'\u00e9tiquette Pass\u00e9/Aujourd'hui/\u00e0 venir
   se recalcule toute seule \u00e0 chaque ouverture, en comparant la date de l'event
   \u00e0 la date actuelle du t\u00e9l\u00e9phone. Reste juste 100% fiable dans le temps sans
   avoir besoin qu'on la remette \u00e0 jour manuellement. */
function newsDateStatus(dateStr){
  const [d, m, y] = dateStr.split("/").map(Number);
  const eventDate = new Date(y, m-1, d);
  const today = new Date();
  const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const diffDays = Math.round((eventDate - todayMidnight) / 86400000);
  if (diffDays === 0) return { label: "Aujourd'hui", state: "today" };
  if (diffDays < 0) return { label: "Pass\u00e9", state: "past" };
  if (diffDays === 1) return { label: "Demain", state: "future" };
  return { label: "Dans " + diffDays + " j", state: "future" };
}

function renderNews(){
  return NEWS.map((n,i) => {
    const status = newsDateStatus(n.date);
    const badgeStyle = status.state === "future" ? "background:rgba(124,106,232,.18);color:var(--c-purple);"
                      : status.state === "today" ? "background:rgba(232,184,75,.18);color:var(--c-gold);"
                      : "background:rgba(255,255,255,.06);color:var(--text-2);";
    return '<div class="news-item ' + (status.state === "future" ? "upcoming" : "") + '" style="animation-delay:' + (i*0.05) + 's">' +
    '  <div class="news-card glass">' +
    '    <div class="news-top"><span class="news-date">' + n.date + '</span>' +
    '      <span class="news-badge" style="' + badgeStyle + '">' + status.label + (n.isRumor ? " \u00b7 Rumeur" : "") + '</span></div>' +
    '    <div class="news-title">' + n.title + '</div>' +
    '    <div class="news-desc">' + n.desc + '</div>' +
    '  </div></div>';
  }).join("");
}

          ['small','medium','large'].map(sz => '<button class="' + (s.textSize===sz?"active":"") + '" onclick="setTextSize(\'' + sz + '\')">' + ({small:"Petit",medium:"Moyen",large:"Grand"}[sz]) + '</button>').join("") +
          '    </div></div>';
  html += '  <div class="setting-row" style="flex-direction:column;align-items:stretch;">' +
          '    <div class="setting-label" style="margin-bottom:8px;">Couleur d\u2019accent</div>' +
          '    <div class="segmented">' +
          Object.keys(ACCENTS).map(key => '<button class="' + (s.accent===key?"active":"") + '" onclick="setAccent(\'' + key + '\')">' + ACCENTS[key].label + '</button>').join("") +
          '    </div></div>';
  html += '  <div class="setting-row"><div><div class="setting-label">Mode compact</div><div class="setting-sub">Liste de la Collection plus dense, notes masqu\u00e9es</div></div>' +
          '    <button class="switch ' + (s.compactMode?"on":"") + '" role="switch" aria-checked="' + (!!s.compactMode) + '" aria-label="Mode compact" onclick="toggleCompactMode()"><span class="knob"></span></button></div>';
  html += '</div>';

  html += '<div class="glass section-card">';
  html += '  <div class="section-title">Confort</div>';
  html += '  <div class="setting-row"><div><div class="setting-label">R\u00e9duire les animations</div><div class="setting-sub">D\u00e9sactive les transitions et effets d\u2019entr\u00e9e, ind\u00e9pendamment du r\u00e9glage de ton t\u00e9l\u00e9phone</div></div>' +
          '    <button class="switch ' + (s.reducedMotion?"on":"") + '" role="switch" aria-checked="' + (!!s.reducedMotion) + '" aria-label="R\u00e9duire les animations" onclick="toggleReducedMotion()"><span class="knob"></span></button></div>';
  html += '  <div class="setting-row"><div><div class="setting-label">Vibrations</div><div class="setting-sub">Petite vibration quand tu obtiens ou ma\u00eetrises un Sprite (si ton appareil le supporte)</div></div>' +
          '    <button class="switch ' + (s.vibrations?"on":"") + '" role="switch" aria-checked="' + (!!s.vibrations) + '" aria-label="Vibrations" onclick="toggleVibrations()"><span class="knob"></span></button></div>';
  html += '</div>';

  html += '<div class="glass section-card">';
  html += '  <div class="section-title">Donn\u00e9es</div>';
  html += '  <div class="setting-row"><div><div class="setting-label">Exporter la progression</div><div class="setting-sub">Sauvegarde en fichier .json</div></div><button class="btn btn-ghost" onclick="exportData()">Exporter</button></div>';
  html += '  <div class="setting-row"><div><div class="setting-label">Importer une sauvegarde</div><div class="setting-sub">Restaure depuis un fichier .json</div></div><button class="btn btn-ghost" onclick="document.getElementById(\'importInput\').click()">Importer</button></div>';
  html += '  <input type="file" id="importInput" accept="application/json" onchange="importData(event)">';
  html += '  <div class="setting-row"><div><div class="setting-label" style="color:var(--r-mythic);">R\u00e9initialiser</div><div class="setting-sub">Efface toute la progression</div></div><button class="btn btn-ghost" style="border-color:var(--r-mythic);color:var(--r-mythic);" onclick="resetAll()">R\u00e9initialiser</button></div>';
  html += '</div>';

  html += '<div class="glass section-card">';
  html += '  <div class="section-title">\u2139\ufe0f \u00c0 propos des taux</div>';
  html += '  <div class="about-note">Taux "Base" issus d\'une table d\u00e9taill\u00e9e communautaire (AccountShark, maj 02/07/2026) \u2014 non officiels, Epic ne publie pas ces chiffres. Taux Gold/Gummy/Galaxy calcul\u00e9s avec un ratio observ\u00e9 sur Aura/Striker (Base\u2192Gold \u00f782, \u2192Gummy \u00f7143, \u2192Galaxy \u00f7287) puis extrapol\u00e9s aux autres Sprites.</div>';
  html += '  <div class="about-note">Temps de capture estim\u00e9 (\u23f1\ufe0f dans la fiche de chaque Sprite) = calcul th\u00e9orique en supposant ' + CHESTS_PER_MATCH + ' Coffres Sprite ouverts par partie sur ~' + MATCH_MINUTES + ' min de farm (zone dense type Sinister Strip). C\'est une moyenne statistique, pas une garantie : tu peux l\'obtenir bien plus vite... ou bien plus lentement.</div>';
  html += '  <div class="about-note">Sprite Dex \u00b7 application non officielle, non affili\u00e9e \u00e0 Epic Games.</div>';
  html += '</div>';

  return html;
}

function toggleTheme(){
  state.settings.theme = state.settings.theme === "dark" ? "light" : "dark";
  applyTheme();
  persistSettings();
  renderPage();
}
function applyTheme(){
  document.documentElement.setAttribute("data-theme", state.settings.theme);
  document.querySelector('meta[name="theme-color"]').setAttribute("content", state.settings.theme === "dark" ? "#0B0D14" : "#F3F1FA");
}
function setTextSize(sz){
  state.settings.textSize = sz;
  applyTextSize();
  persistSettings();
  renderPage();
}
function applyTextSize(){
  const map = { small: "15px", medium: "16px", large: "18.5px" };
  document.documentElement.style.setProperty("--fs-root", map[state.settings.textSize] || "16px");
}

function toggleReducedMotion(){
  state.settings.reducedMotion = !state.settings.reducedMotion;
  applyReducedMotion();
  persistSettings();
  renderPage();
}
function applyReducedMotion(){
  document.documentElement.classList.toggle("force-reduced-motion", !!state.settings.reducedMotion);
}

function toggleVibrations(){
  state.settings.vibrations = !state.settings.vibrations;
  persistSettings();
  if (state.settings.vibrations) hapticFeedback(14);
  renderPage();
}

function toggleCompactMode(){
  state.settings.compactMode = !state.settings.compactMode;
  applyCompactMode();
  persistSettings();
  renderPage();
}
function applyCompactMode(){
  document.documentElement.classList.toggle("compact", !!state.settings.compactMode);
}

function setAccent(key){
  state.settings.accent = key;
  applyAccent();
  persistSettings();
  renderPage();
}
function applyAccent(){
  const a = ACCENTS[state.settings.accent] || ACCENTS.aura;
  const root = document.documentElement.style;
  root.setProperty("--c-purple", a.purple);
  root.setProperty("--c-pink", a.pink);
  root.setProperty("--c-gold", a.gold);
}

function exportData(){
  const payload = { progress: state.progress, favorites: state.favorites, settings: state.settings, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "sprite-dex-sauvegarde.json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  showToast("Fichier export\u00e9", "\u{1f4e4}");
}
function importData(evt){
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (data.progress) state.progress = data.progress;
      if (data.favorites) state.favorites = data.favorites;
      if (data.settings) state.settings = Object.assign(state.settings, data.settings);
      persistProgress(); persistFavorites(); persistSettings();
      applyTheme(); applyTextSize();
      renderPage();
      showToast("Sauvegarde import\u00e9e", "\u2705");
    } catch(e) {
      showToast("Fichier invalide", "\u26a0\ufe0f");
    }
  };
  reader.readAsText(file);
  evt.target.value = "";
}

/* ----------------------------------------------------------------
   6g. SUCCÈS — détection de déblocage + popup + confettis
   ---------------------------------------------------------------- */
let achvBaselineDone = false;
function checkAchievements(){
  const done = countDone(), masteryDone = countMastery();
  const unlockedNow = ACHIEVEMENTS.filter(a => a.check(state.progress, done, masteryDone)).map(a => a.id);
  const newOnes = unlockedNow.filter(id => !state.achvSeen.includes(id));
  if (!newOnes.length) return;
  state.achvSeen = state.achvSeen.concat(newOnes);
  persistAchvSeen();
  // Au tout premier chargement, une progression déjà existante peut "débloquer"
  // plusieurs succès d'un coup : on les enregistre comme vus sans popup, pour ne
  // pas fêter en confettis des succès obtenus avant l'installation de cette version.
  if (!achvBaselineDone) return;
  showUnlockPopup(ACHIEVEMENTS.find(a => a.id === newOnes[0]));
}
function showUnlockPopup(achv){
  if (!achv) return;
  const overlay = document.getElementById("unlockOverlay");
  overlay.innerHTML = '<div class="unlock-card">' +
    '<div class="unlock-eyebrow">Succ\u00e8s d\u00e9bloqu\u00e9</div>' +
    '<div class="unlock-icon">' + achv.icon + '</div>' +
    '<div class="unlock-name">' + achv.name + '</div>' +
    '<div class="unlock-desc">' + achv.desc + '</div>' +
    '<button class="btn btn-primary btn-block" style="margin-top:20px;" onclick="closeUnlockPopup()">G\u00e9nial !</button>' +
  '</div>';
  overlay.classList.add("show");
  fireConfetti();
}
function closeUnlockPopup(){ document.getElementById("unlockOverlay").classList.remove("show"); }

/* ----------------------------------------------------------------
   7. INITIALISATION + PWA (manifest dynamique + service worker)
   ---------------------------------------------------------------- */
function initPWA(){
  // Manifest généré en mémoire (garde tout dans un seul fichier HTML)
  try {
    const manifest = {
      name: "Sprite Dex", short_name: "Sprite Dex", start_url: ".", display: "standalone",
      background_color: "#0B0D14", theme_color: "#0B0D14",
      icons: [{ src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230B0D14'/%3E%3Ctext x='50' y='66' font-size='58' text-anchor='middle'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E", sizes: "100x100", type: "image/svg+xml" }]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
    const link = document.createElement("link");
    link.rel = "manifest"; link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  } catch(e){ /* silencieux : le manifeste est une amélioration progressive */ }

  // Service worker minimal (cache-first) enregistré depuis un Blob.
  if ("serviceWorker" in navigator){
    try {
      const swCode = "const C='sprite-dex-v1';" +
        "self.addEventListener('install',e=>self.skipWaiting());" +
        "self.addEventListener('activate',e=>self.clients.claim());" +
        "self.addEventListener('fetch',e=>{" +
        "  e.respondWith(caches.open(C).then(cache=>cache.match(e.request).then(res=>{" +
        "    const fetchPromise=fetch(e.request).then(netRes=>{cache.put(e.request,netRes.clone());return netRes;}).catch(()=>res);" +
        "    return res||fetchPromise;" +
        "  })));" +
        "});";
      const swBlob = new Blob([swCode], { type: "application/javascript" });
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    } catch(e){ /* pas de mode hors-ligne disponible dans cet environnement, l'app reste fonctionnelle en ligne */ }
  }
}

function init(){
  applyTheme();
  applyTextSize();
  applyReducedMotion();
  applyCompactMode();
  applyAccent();
  const currentLevel = levelInfo(computeTotalXP()).level;
  if (state.levelSeen < currentLevel){ state.levelSeen = currentLevel; persistLevelSeen(); }
  renderShell();
  renderPage(); // premier rendu : sert aussi de base silencieuse pour les succès déjà acquis
  achvBaselineDone = true;
  initPWA();
}
init();
</script>
